name: Create Release Branch and PR

on:
  workflow_dispatch:
    inputs:
      release_branch:
        description: 'リリースブランチ名 (例: 1.0.0 → release/1.0.0 で作成されます)'
        required: true
        type: string
      pr_title:
        description: 'PRのタイトル'
        required: true
        type: string

jobs:
  create-release:
    name: Create Release Branch and PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Create release branch
        run: |
          git checkout -b release/${{ inputs.release_branch }}
          git push origin release/${{ inputs.release_branch }}

      - name: Create PR to main
        run: |
          gh pr create \
            --base main \
            --head release/${{ inputs.release_branch }} \
            --title "[release] ${{ inputs.pr_title }}" \
            --body "## Release PR

          - **元ブランチ:** \`${{ github.ref_name }}\`
          - **リリースブランチ:** \`release/${{ inputs.release_branch }}\`
          - **作成者:** @${{ github.actor }}
          - **実行ワークフロー:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
