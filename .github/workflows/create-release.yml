name: Create Release Branch and PR

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'リリースの元になるブランチ'
        required: true
        type: string
      release_branch:
        description: 'リリースブランチ名 (例: release/1.0.0)'
        required: true
        type: string
      pr_title:
        description: 'PRのタイトル'
        required: true
        type: string

jobs:
  create-release:
    name: Create Release Branch and PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_branch }}
          fetch-depth: 0

      - name: Create release branch
        run: |
          git checkout -b ${{ inputs.release_branch }}
          git push origin ${{ inputs.release_branch }}

      - name: Create PR to main
        run: |
          gh pr create \
            --base main \
            --head ${{ inputs.release_branch }} \
            --title "[release] ${{ inputs.pr_title }}" \
            --body "## Release PR

          - **元ブランチ:** \`${{ inputs.source_branch }}\`
          - **リリースブランチ:** \`${{ inputs.release_branch }}\`
          - **作成者:** @${{ github.actor }}
          - **実行ワークフロー:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
